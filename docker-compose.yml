# Termo Track — containerized stack.
#
# Runs the two network servers (FastAPI backend + nginx-served frontend).
#
# The BLE scanner (scanner_daemon.py) is NOT containerized: it needs native
# Bluetooth hardware access, which Docker Desktop on macOS cannot provide
# (the engine runs in a Linux VM with no CoreBluetooth / BLE passthrough).
# Run it on the host instead — it writes to the same shared DB:
#
#   cd backend && DB_PATH="$(pwd)/../data/readings.db" \
#       .venv/bin/python scanner_daemon.py
#
# Both the scanner (host) and the backend (container) read/write
# ./data/readings.db, so live readings flow through to the UI.

services:
  backend:
    build: ./backend
    environment:
      HOST: 0.0.0.0
      PORT: 8765
      DB_PATH: /data/readings.db
    volumes:
      - ./data:/data
    expose:
      - "8765"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8088:80"
    depends_on:
      - backend
    restart: unless-stopped
