# Termo Track — containerized stack.
#
# Runs the two network servers (FastAPI backend + nginx-served frontend).
#
# The BLE scanner (scanner_daemon.py) is NOT containerized: it needs native
# Bluetooth hardware access, which Docker Desktop on macOS cannot provide
# (the engine runs in a Linux VM with no CoreBluetooth / BLE passthrough).
# Run it on the host instead — it writes to the same shared DB:
#
#   cd backend && DB_PATH="$(pwd)/../data/readings.db" \
#       .venv/bin/python scanner_daemon.py
#
# Both the scanner (host) and the backend (container) read/write
# ./data/readings.db, so live readings flow through to the UI.

services:
  backend:
    build: ./backend
    environment:
      HOST: 0.0.0.0
      PORT: 8765
      DB_PATH: /data/readings.db
    volumes:
      - ./data:/data
    expose:
      - "8765"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8088:80"
    depends_on:
      - backend
    restart: unless-stopped

  # MCP server — exposes sensor data over the Model Context Protocol (HTTP).
  # Reads the same ./data/readings.db (read-only); connect clients to
  # http://localhost:8675/mcp. Local stdio clients (Claude Desktop / Claude
  # Code) don't need this container — they spawn mcp_server.py directly.
  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8675
      DB_PATH: /data/readings.db
      # Outside weather location. Pinned to Nantes, France. (If these are unset,
      # the server auto-detects the location from the host's public IP instead.)
      LATITUDE: "47.2184"
      LONGITUDE: "-1.5536"
      LOCATION_NAME: "Nantes"
    volumes:
      - ./data:/data:ro
    ports:
      - "8675:8675"
    restart: unless-stopped
